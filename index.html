<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch-a-sketch</title>
    <script src="index.js" defer></script>
    <style>
      :root {
        --item-size: 48px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        align-items: center;
        flex-direction: column;
        height: 100vh;
        margin-top: 40px;

        overflow: hidden;
      }
      .container {
        width: 768px;
        aspect-ratio: 1;
        /* border: 1px solid black; */

        display: flex;
        flex-wrap: wrap;
      }
      .item {
        border: 1px solid black;
        width: var(--item-size);
        height: var(--item-size);
      }
    </style>
  </head>
  <body>
    <form action="">
      <label for="width">Width</label>
      <input type="number" id="width" name="width" min="0" max="100" />
      <label for="height">Height</label>
      <input type="number" id="height" name="height" min="0" max="100" />
      <button type="submit">Submit</button>
    </form>
    <h1>Etch-a-sketch</h1>
    <div class="container"></div>
  </body>
</html>
